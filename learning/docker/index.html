<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Docker Interactive Lab</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Cascadia Code','Fira Code','Courier New',monospace}
:root{--bg:#0a0e14;--surface:#0f1620;--border:#1a2332;--text:#b3b1ad;--green:#b8cc52;--cyan:#95e6cb;--yellow:#f9c440;--red:#ff6c6c;--dim:#525a66;--prompt:#f9c440;--highlight:rgba(184,204,82,0.12)}
body{background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:8px 20px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.header-title{color:var(--green);font-size:13px;font-weight:bold}
.header-title span{color:var(--dim)}
.header-nav{display:flex;gap:16px;font-size:12px}
.header-nav a{color:var(--dim);text-decoration:none}
.header-nav a:hover{color:var(--cyan)}
#terminal{flex:1;overflow-y:auto;padding:12px 16px 0;scroll-behavior:smooth}
#terminal::-webkit-scrollbar{width:6px}
#terminal::-webkit-scrollbar-track{background:var(--surface)}
#terminal::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.line{margin-bottom:2px;line-height:1.5;white-space:pre-wrap;word-break:break-word;animation:fadeIn 0.15s ease-out}
@keyframes fadeIn{from{opacity:0;transform:translateY(-3px)}to{opacity:1;transform:translateY(0)}}
.line.prompt-line{color:var(--prompt);font-weight:bold}
.line.error{color:var(--red)}
.line.info{color:var(--dim)}
.line.success{color:var(--green)}
.line.cyan{color:var(--cyan)}
.line.yellow{color:var(--yellow)}
.line.dim{color:var(--dim)}
.line.bold{font-weight:bold}
.line.lg{font-size:1.1em;margin:6px 0}
.line.section{color:var(--green);font-weight:bold;font-size:1.1em;margin:10px 0 4px;letter-spacing:0.5px}
.line.subsection{color:var(--cyan);margin:6px 0 2px}
.line.diagram{color:var(--dim);font-size:0.85em;line-height:1.2;margin:4px 0}
.line.code{color:var(--yellow);font-size:0.85em;padding:6px 12px;margin:4px 0;border-left:2px solid var(--border);background:var(--highlight);border-radius:0 4px 4px 0}
.line.divider{color:var(--border);margin:6px 0}
.line.tldr{color:var(--yellow);font-style:italic;margin:8px 0 4px;padding:6px 12px;border:1px dashed var(--border);border-radius:4px}
.line.highlight{background:var(--highlight);padding:4px 8px;border-radius:4px;margin:4px 0}
@media(max-width:600px){.header-nav{display:none}#terminal{padding:8px 10px}.line{font-size:0.9em}}
</style>
</head>
<body>

<div class="header">
<div class="header-title">Docker Interactive Lab <span>— explore, experiment, understand</span></div>
<div class="header-nav"><a href="https://veerakumar.com">veerakumar.com</a><a href="https://github.com/theveerakumar">github</a></div>
</div>

<div id="terminal"></div>

<div class="suggestions" id="suggestions">
<span onclick="run('help')">help</span>
<span onclick="run('basics')">basics</span>
<span onclick="run('images')">images</span>
<span onclick="run('containers')">containers</span>
<span onclick="run('dockerfile')">dockerfile</span>
<span onclick="run('compose')">compose</span>
<span onclick="run('networking')">networking</span>
<span onclick="run('storage')">storage</span>
<span onclick="run('security')">security</span>
<span onclick="run('diagram')">diagram</span>
</div>

<div class="input-area">
<span class="prompt">$</span>
<input type="text" id="cmd" placeholder="type a command or try help" autofocus spellcheck="false" autocomplete="off">
</div>

<script>
const term = document.getElementById('terminal');
const input = document.getElementById('cmd');

function scrollBottom() { setTimeout(() => { term.scrollTop = term.scrollHeight; }, 20); }

function w(text, cls = '') {
  const d = document.createElement('div');
  d.className = 'line' + (cls ? ' ' + cls : '');
  d.innerHTML = text;
  term.appendChild(d);
  scrollBottom();
}

function writeLines(lines) {
  lines.forEach((l, i) => {
    setTimeout(() => {
      if (typeof l === 'string') w(l);
      else w(l[0], l[1] || '');
      if (i === lines.length - 1) scrollBottom();
    }, i * 25);
  });
}

function divider() { return ['─'.repeat(60), 'divider']; }
function section(title) { return ['<span style="color:var(--green)">■</span> ' + title, 'section']; }
function subsection(title) { return [title, 'subsection']; }
function codeBlock(lines) { return [lines.map(l => '  ' + l).join('\n'), 'code']; }
function diagramBlock(lines) { return [lines.join('\n'), 'diagram']; }
function tldr(text) { return ['<span style="color:var(--yellow)">⚡</span> ' + text, 'tldr']; }
function note(text) { return [text, 'dim']; }

      '  # 6. Clean up in the same RUN layer',
      '  RUN apt-get update && apt-get install -y \\',
      '      curl \\',
      '  && rm -rf /var/lib/apt/lists/*'

    divider(),

      '  RUN go mod download',
      '  COPY . .',
      '  RUN CGO_ENABLED=0 go build -o /app/server',
      '',
      '  # FINAL (stage 2) — minimal image',
      '  FROM scratch',
      '  COPY --from=builder /app/server /server',
      '  COPY --from=builder /etc/ssl/certs /etc/ssl/certs',
      '  EXPOSE 8080',
      '  CMD ["/server"]',
      '',
      '  # Result: a ~10MB image with NO OS, just the binary!',
      '  # This is the holy grail: tiny, fast, secure.'
    ]),
    divider(),
    section('Build Commands'),
    codeBlock([
      '  # Build an image',
      '  $ docker build -t myapp:latest .',
      '',
      '  # Build with build args',

      '',
      '  # Build with a specific Dockerfile',
      '  $ docker build -f Dockerfile.prod -t myapp:prod .',
      '',
      '  # Cache busting',

  ]
};

function run(cmd) {
  const parts = cmd.trim().split(/\s+/);
  const command = parts[0].toLowerCase();

  w('<span style="color:var(--prompt)">$</span> ' + cmd, 'prompt-line');

  if (command === 'help') { writeLines(topics.help.content); }
  else if (command === 'basics') { writeLines(topics.basics.content); }
  else if (command === 'images') { writeLines(topics.images.content); }
  else if (command === 'containers') { writeLines(topics.containers.content); }
  else if (command === 'dockerfile') { writeLines(topics.dockerfile.content); }
  else if (command === 'compose') { writeLines(topics.compose.content); }
  else if (command === 'networking') { writeLines(topics.networking.content); }
  else if (command === 'storage') { writeLines(topics.storage.content); }
  else if (command === 'security') { writeLines(topics.security.content); }
  else if (command === 'diagram') { writeLines(topics.diagram.content); }
  else if (command === 'clear') {
    term.innerHTML = '';
  }
  else if (command === '') { }
  else {
    w('Unknown command: ' + command, 'error');
    w('Type "help" to see all available commands.', 'info');
  }
  scrollBottom();
}

input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') {
    const cmd = input.value.trim();
    input.value = '';
    if (cmd) run(cmd);
  }
});

const bootLines = [
  ['<span style="color:var(--green)">╔═══════════════════════════════════════════════╗</span>', ''],
  ['<span style="color:var(--green)">║</span>     <span style="color:var(--cyan)">DOCKER INTERACTIVE LAB</span>                  <span style="color:var(--green)">║</span>', ''],
  ['<span style="color:var(--green)">╚═══════════════════════════════════════════════╝</span>', ''],
  '',
  ['Welcome, student. This terminal is your Docker sandbox.', 'info'],
  ['Every command teaches a concept using: <span style="color:var(--yellow)">Problem → Mechanism → Visual → Code → TL;DR</span>', 'info'],
  '',
  ['Type <span style="color:var(--cyan)">help</span> to begin, or try <span style="color:var(--cyan)">basics</span>, <span style="color:var(--cyan)">images</span>, <span style="color:var(--cyan)">containers</span>, <span style="color:var(--cyan)">diagram</span>', 'cyan'],
];

let bootIdx = 0;
function typeBoot() {
  if (bootIdx < bootLines.length) {
    const l = bootLines[bootIdx];
    if (typeof l === 'string') { w(l); }
    else { w(l[0], l[1]); }
    bootIdx++;
    setTimeout(typeBoot, 60);
  } else {
    w('', '');
    w('<span style="color:var(--green)">System ready. <span style="color:var(--cyan)">$ █</span>', '');
    scrollBottom();
  }
}

setTimeout(typeBoot, 200);

document.addEventListener('click', () => input.focus());

<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Kubernetes Interactive Lab</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Cascadia Code','Fira Code','Courier New',monospace}
:root{--bg:#0a0e14;--surface:#0f1620;--border:#1a2332;--text:#b3b1ad;--green:#b8cc52;--cyan:#95e6cb;--yellow:#f9c440;--red:#ff6c6c;--dim:#525a66;--prompt:#f9c440;--highlight:rgba(184,204,82,0.12)}
body{background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:8px 20px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.header-title{color:var(--green);font-size:13px;font-weight:bold}
.header-title span{color:var(--dim)}
.header-nav{display:flex;gap:16px;font-size:12px}
.header-nav a{color:var(--dim);text-decoration:none}
.header-nav a:hover{color:var(--cyan)}
#terminal{flex:1;overflow-y:auto;padding:12px 16px 0;scroll-behavior:smooth}
#terminal::-webkit-scrollbar{width:6px}
#terminal::-webkit-scrollbar-track{background:var(--surface)}
#terminal::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.line{margin-bottom:2px;line-height:1.5;white-space:pre-wrap;word-break:break-word;animation:fadeIn 0.15s ease-out}
@keyframes fadeIn{from{opacity:0;transform:translateY(-3px)}to{opacity:1;transform:translateY(0)}}
.line.prompt-line{color:var(--prompt);font-weight:bold}
.line.error{color:var(--red)}
.line.info{color:var(--dim)}
.line.success{color:var(--green)}
.line.cyan{color:var(--cyan)}
.line.yellow{color:var(--yellow)}
.line.dim{color:var(--dim)}
.line.bold{font-weight:bold}
.line.lg{font-size:1.1em;margin:6px 0}
.line.section{color:var(--green);font-weight:bold;font-size:1.1em;margin:10px 0 4px;letter-spacing:0.5px}
.line.subsection{color:var(--cyan);margin:6px 0 2px}
.line.diagram{color:var(--dim);font-size:0.85em;line-height:1.2;margin:4px 0}
.line.code{color:var(--yellow);font-size:0.85em;padding:6px 12px;margin:4px 0;border-left:2px solid var(--border);background:var(--highlight);border-radius:0 4px 4px 0}
.line.divider{color:var(--border);margin:6px 0}
.line.tldr{color:var(--yellow);font-style:italic;margin:8px 0 4px;padding:6px 12px;border:1px dashed var(--border);border-radius:4px}
@media(max-width:600px){.header-nav{display:none}#terminal{padding:8px 10px}.line{font-size:0.9em}}
</style>
</head>
<body>

<div class="header">
<div class="header-title">Kubernetes Interactive Lab <span>— explore, experiment, understand</span></div>
<div class="header-nav"><a href="https://veerakumar.com">veerakumar.com</a><a href="https://github.com/theveerakumar">github</a><a href="https://kubernetes.io/docs/" target="_blank">official docs</a></div>
</div>

<div id="terminal"></div>

<div class="suggestions" id="suggestions">
<span onclick="run('help')">help</span>
<span onclick="run('basics')">basics</span>
<span onclick="run('pods')">pods</span>
<span onclick="run('workloads')">workloads</span>
<span onclick="run('deployment')">deployment</span>
<span onclick="run('replicaset')">replicaset</span>
<span onclick="run('daemonset')">daemonset</span>
<span onclick="run('statefulset')">statefulset</span>
<span onclick="run('job')">job</span>
<span onclick="run('services')">services</span>
<span onclick="run('config')">config</span>
<span onclick="run('storage')">storage</span>
<span onclick="run('scheduling')">scheduling</span>
<span onclick="run('networking')">networking</span>
<span onclick="run('security')">security</span>
<span onclick="run('kubectl')">kubectl</span>
<span onclick="run('diagram')">diagram</span>
</div>

<div class="input-area">
<span class="prompt">$</span>
<input type="text" id="cmd" placeholder="type a command or try help" autofocus spellcheck="false" autocomplete="off">
</div>

<script>
const term = document.getElementById('terminal');
const input = document.getElementById('cmd');

function scrollBottom() { setTimeout(() => { term.scrollTop = term.scrollHeight; }, 20); }
function w(text, cls = '') { const d = document.createElement('div'); d.className = 'line' + (cls ? ' ' + cls : ''); d.innerHTML = text; term.appendChild(d); scrollBottom(); }

function writeLines(lines) {
  lines.forEach((l, i) => {
    setTimeout(() => {
      if (typeof l === 'string') w(l);
      else w(l[0], l[1] || '');
      if (i === lines.length - 1) scrollBottom();
    }, i * 25);
  });
}

function divider() { return ['─'.repeat(60), 'divider']; }
function section(title) { return ['<span style="color:var(--green)">■</span> ' + title, 'section']; }
function subsection(title) { return [title, 'subsection']; }
function codeBlock(lines) { return [lines.map(l => '  ' + l).join('\n'), 'code']; }
function diagramBlock(lines) { return [lines.join('\n'), 'diagram']; }
function tldr(text) { return ['<span style="color:var(--yellow)">⚡</span> ' + text, 'tldr']; }
function note(text) { return [text, 'dim']; }

    ['"A Service is an abstract way to expose an application running on a set of Pods as a network service."', 'cyan'],
    note('Pods are ephemeral — they come and go, IPs change. Services provide a stable endpoint (IP + DNS) that load balances across pods.'),
    divider(),
    section('Service Types'),
    diagramBlock([
      '  ┌──────────────────────────────────────────────────────────┐',
      '  │  ClusterIP (default)                                     │',
      '  │  • Internal virtual IP, only accessible within cluster   │',
      '  │  • Good for: internal microservice communication         │',
      '  │                                                          │',
      '  │  NodePort                                                 │',
      '  │  • Exposes on <NodeIP>:<NodePort> (30000-32767)          │',
      '  │  • Good for: dev/test, direct node access                │',
      '  │                                                          │',
      '  │  LoadBalancer                                             │',
      '  │  • Provision a cloud LB (AWS ELB, GCP LB, Azure LB)      │',
      '  │  • Each LB gives you a public IP                          │',
      '  │  • Good for: production external access                  │',
      '  │                                                          │',
      '  │  ExternalName                                             │',
      '  │  • DNS CNAME to an external service (e.g., RDS)          │',
      '  │  • No proxy, no ports — just DNS                         │',
      '  └──────────────────────────────────────────────────────────┘'
    ]),
    divider(),
    section('Service Definition'),
    codeBlock([
      '  apiVersion: v1',
      '  kind: Service',
      '  metadata:',
      '    name: web-service',
      '  spec:',
      '    type: ClusterIP',
      '    selector:  # which pods to route to',
      '      app: web',
      '    ports:',
      '    - port: 80          # service port',
      '      targetPort: 3000  # container port',
      '      protocol: TCP',
      '',
      '  # The service gets a stable ClusterIP:',
      '  $ kubectl get svc web-service',
      '  NAME          TYPE        CLUSTER-IP     PORT(S)',
      '  web-service   ClusterIP   10.96.123.45   80/TCP',
      '',
      '  # DNS resolution (built-in):',
      '  # web-service.default.svc.cluster.local → 10.96.123.45',
      '  # Other pods can reach it as just "web-service"'
    ]),
    divider(),
    section('Service Discovery — kube-dns / CoreDNS'),
    diagramBlock([
      '  Pod "frontend" wants to talk to Pod "backend":',
      '',
      '  frontend ───→ backend ───→ endpoints (pod IPs)',
      '                  │',
      '                  │ DNS query: backend.default.svc',
      '                  ▼',
      '              ┌──────────┐',
      '              │ CoreDNS  │  ← cluster IP of backend',
      '              └──────────┘',
      '',
      '  Resolution patterns:',
      '  <service>                     # same namespace',
      '  <service>.<namespace>         # cross-namespace',
      '  <service>.<namespace>.svc     # cluster-local domain',
      '  <service>.<namespace>.svc.cluster.local  # FQDN',
      '',
      '  $ kubectl run -it --rm debug --image=busybox -- sh',
      '  / # wget -qO- http://web-service:80'
    ]),
    divider(),
    section('Ingress — L7 Routing'),
    codeBlock([
      '  # Ingress exposes HTTP/HTTPS routes from outside',
      '  # the cluster to services within the cluster.',
      '',
      '  apiVersion: networking.k8s.io/v1',
      '  kind: Ingress',
      '  metadata:',
      '    name: my-ingress',
      '    annotations:',
      '      nginx.ingress.kubernetes.io/rewrite-target: /',
      '  spec:',
      '    ingressClassName: nginx',
      '    rules:',
      '    - host: app.example.com',
      '      http:',
      '        paths:',
      '        - path: /api',
      '          pathType: Prefix',
      '          backend:',
      '            service:',
      '              name: api-service',
      '              port:',
      '                number: 80',
      '        - path: /',
      '          pathType: Prefix',
      '          backend:',
      '            service:',
      '              name: web-service',
      '              port:',
      '                number: 80',
      '    tls:',
      '    - hosts:',
      '      - app.example.com',
      '      secretName: app-tls',
      '',
      '  # An Ingress Controller must be deployed (NGINX, Traefik, HAProxy, AWS ALB...)',
      '  # The Ingress resource is just a config — the controller implements it.'
    ]),
    divider(),
    section('Endpoints & EndpointSlices'),
    codeBlock([
      '  # Services track healthy pods via EndpointSlices:',
      '  $ kubectl get endpoints web-service',
      '  NAME          ENDPOINTS',
      '  web-service   10.1.0.1:80,10.1.0.2:80,10.1.0.3:80',
      '',
      '  $ kubectl get endpointslices -l kubernetes.io/service-name=web-service',
      '',
      '  # How traffic flows:',
      '  # 1. kube-proxy watches API server for Service/Endpoint changes',
      '  # 2. Updates iptables/IPVS rules on every node',
      '  # 3. When a pod is created/removed, rules update (usually <1s)',
      '  # 4. Traffic to ClusterIP is load-balanced across ready pods',
      '',
      '  # Session affinity (stickiness):',
      '  spec:',
      '    sessionAffinity: ClientIP',
      '    sessionAffinityConfig:',
      '      clientIP:',
      '        timeoutSeconds: 3600'
    ]),
    tldr('Services provide stable networking for ephemeral pods. ClusterIP for internal, NodePort for dev, LoadBalancer for cloud, Ingress for HTTP routing. CoreDNS handles service discovery.'),
  ]
};

      '        server_name example.com;',

      '',
      '  # Create from literal values:',
      '  $ kubectl create configmap app-config \\',
      '    --from-literal=APP_ENV=production \\',
      '    --from-literal=APP_LOG_LEVEL=info',
      '',
      '  # Create from files:',
      '  $ kubectl create configmap nginx-config --from-file=nginx.conf',
      '',
      '  # Create from .env file:',

      '  apiVersion: v1',
      '  kind: Pod',
      '  metadata:',

      '  spec:',
      '    containers:',
      '    - name: app',
      '      image: myapp:latest',
      '      envFrom:',
      '      - configMapRef:',
      '          name: app-config',
      '      env:  # individual keys',
      '      - name: APP_PORT',
      '        valueFrom:',
      '          configMapKeyRef:',
      '            name: app-config',
      '            key: APP_PORT',
      '      volumeMounts:',
      '      - name: config-volume',

      '    volumes:',
      '    - name: config-volume',

      '',

      '  $ kubectl exec configmap-demo -- ls /etc/config/',

      '',
      '  # Better: use kubectl create (auto-encodes)',

    section('Using Secrets in a Pod'),

      '  apiVersion: v1',

      '      image: myapp:latest',
      '      env:  # individual keys (note: valueFrom, not value)',

      '    - name: secret-volume',

      '',
      '  # Best practices:',
      '  #  ■ Enable encryption at rest (--encryption-provider-config)',
      '  #  ■ Use external secrets manager (HashiCorp Vault, AWS Secrets Manager)',

    divider(),
    section('ConfigMap & Secret Best Practices'),
    codeBlock([
      '  # DON\'T:',
      '  #  ■ Store secrets in Git in plaintext',
      '  #  ■ Use the same ConfigMap/Secret across environments',
      '  #  ■ Put binary data in ConfigMaps (use Secrets)',
      '  #  ■ Exceed 1MB per ConfigMap/Secret (etcd limit)',
      '',
      '  # DO:',
      '  #  ■ Use names like app-config, db-config, app-secrets',
      '  #  ■ Group related keys in the same ConfigMap',
      '  #  ■ Use environment-specific overlays (kustomize)',
      '  #  ■ Use immutable ConfigMaps/Secrets for stable configs',
      '',
      '  # Immutable ConfigMaps (K8s 1.21+):',
      '  apiVersion: v1',
      '  kind: ConfigMap',
      '  metadata:',
      '    name: app-config',
      '  immutable: true  # can\'t be changed — must delete/recreate',

      '    APP_ENV: production',

  ]
};

topics.storage = {
  title: 'Storage',
  content: [
    section('Kubernetes Storage'),
    ['"Kubernetes storage abstracts away the complexity of different storage systems through a unified API."', 'cyan'],
    divider(),
    section('Storage Architecture'),
    diagramBlock([
      '  ┌──────────────────────────────────────────────────────────┐',
      '  │  Pod                                                  │',
      '  │  ┌──────────────────────────────────────────────────┐ │',
      '  │  │  Container                                       │ │',
      '  │  │  ├── /data ──────┐                               │ │',
      '  │  │  └────────────────┘                               │ │',
      '  │  └──────────────────────┬───────────────────────────┘ │',
      '  └─────────────────────────┼─────────────────────────────┘',
      '                            │',
      '                   volumeMounts',
      '                            │',
      '                            ▼',
      '  ┌──────────────────────────────────────────────────────────┐',
      '  │  PersistentVolumeClaim (PVC) — request for storage      │',
      '  │  • Requests: 10Gi, ReadWriteOnce                       │',
      '  │  • StorageClass: ssd                                    │',
      '  └──────────────────────┬───────────────────────────────────┘',
      '                         │  binds to',
      '                         ▼',
      '  ┌──────────────────────────────────────────────────────────┐',
      '  │  PersistentVolume (PV) — actual storage                 │',
      '  │  • 10Gi, HostPath (or NFS, EBS, EFS, GCE PD...)        │',
      '  │  • Reclaim policy: Retain / Delete / Recycle            │',
      '  └──────────────────────────────────────────────────────────┘',
      '',
      '  // PVs are cluster resources (like CPU/RAM).',
      '  // PVCs are requests for storage.',
      '  // Kubernetes binds PVCs to matching PVs.'
    ]),
    divider(),
    section('PersistentVolume & PersistentVolumeClaim'),
    codeBlock([
      '  # PV — defined by the cluster admin',
      '  apiVersion: v1',
      '  kind: PersistentVolume',
      '  metadata:',
      '    name: pv-ssd-01',
      '  spec:',
      '    capacity:',
      '      storage: 50Gi',
      '    accessModes:',
      '    - ReadWriteOnce  # single node read-write',
      '    persistentVolumeReclaimPolicy: Retain',
      '    storageClassName: ssd',
      '    hostPath:',
      '      path: /data/k8s/pv-01',
      '',
      '  # PVC — requested by the app developer',
      '  apiVersion: v1',
      '  kind: PersistentVolumeClaim',
      '  metadata:',
      '    name: data-claim',
      '  spec:',
      '    accessModes:',
      '    - ReadWriteOnce',
      '    resources:',
      '      requests:',
      '        storage: 10Gi',
      '    storageClassName: ssd',
      '',
      '  # Use in a Pod:',
      '  volumes:',
      '  - name: data',
      '    persistentVolumeClaim:',
      '      claimName: data-claim'
    ]),
    divider(),
    section('Access Modes'),
    codeBlock([
      '  Access Modes define HOW a volume can be mounted:',
      '',
      '  ReadWriteOnce (RWO)  — One node, read+write',
      '  ReadOnlyMany (ROX)   — Many nodes, read-only',
      '  ReadWriteMany (RWX)  — Many nodes, read+write',
      '',
      '  Volume type     │ RWO  │ ROX  │ RWX',
      '  ────────────────┼──────┼──────┼──────',
      '  HostPath        │  ✓   │  -   │  -',
      '  AWS EBS         │  ✓   │  ✓   │  -',
      '  GCE PD          │  ✓   │  ✓   │  -',
      '  NFS             │  ✓   │  ✓   │  ✓',
      '  Azure File      │  ✓   │  ✓   │  ✓',
      '  CephFS          │  ✓   │  ✓   │  ✓',
      '  Portworx        │  ✓   │  ✓   │  ✓',
      '',
      '  // StatefulSets use RWO (one pod, one volume).',
      '  // Shared filesystems need RWX (NFS, CephFS, EFS).'
    ]),
    divider(),
    section('StorageClasses & Dynamic Provisioning'),
    codeBlock([
      '  # StorageClass defines a "class" of storage',
      '  apiVersion: storage.k8s.io/v1',
      '  kind: StorageClass',
      '  metadata:',
      '    name: fast',
      '  provisioner: ebs.csi.aws.com',
      '  parameters:',
      '    type: gp3',
      '    iopsPerGB: "10"',
      '    fsType: ext4',
      '  reclaimPolicy: Delete',
      '  allowVolumeExpansion: true',
      '',
      '  # Default StorageClass is used when none is specified:',
      '  $ kubectl get storageclass',
      '  NAME   PROVISIONER          RECLAIMPOLICY  VOLUMEBINDING',
      '  fast   ebs.csi.aws.com      Delete         WaitForFirstConsumer',
      '  ssd    kubernetes.io/gce-pd  Delete         Immediate',
      '',
      '  # Dynamic provisioning: PVC → StorageClass → PV is auto-created',
      '  # No manual PV creation needed!',
      '',
      '  # Volume binding modes:',
      '  #  Immediate — create PV immediately',
      '  #  WaitForFirstConsumer — create PV when a pod uses it',
      '  #    (important for topology-aware scheduling)'
    ]),
    divider(),
    section('CSI — Container Storage Interface'),
    codeBlock([
      '  # CSI allows any storage vendor to write a driver',
      '  # that works with Kubernetes — NO core changes needed.',
      '',
      '  # CSI drivers available:',
      '  #  AWS EBS, EFS, FSx',
      '  #  GCE Persistent Disk, Filestore',
      '  #  Azure Disk, Azure File',
      '  #  Ceph, Rook, Portworx, Pure Storage',
      '  #  NFS, iSCSI, FC, Local PV...',
      '',
      '  # CSI driver lifecycle:',
      '  #  1. Install driver pods (DaemonSet + StatefulSet)',
      '  #  2. Driver registers with kubelet over Unix socket',
      '  #  3. PVC → StorageClass → driver provisions volume',
      '  #  4. Pod → kubelet → CSI driver mounts volume',
      '  #  5. Pod deleted → CSI driver unmounts/detaches',
      '',
      '  # CSI features:',
      '  #  ■ Snapshots and cloning',
      '  #  ■ Volume expansion',
      '  #  ■ Topology-aware provisioning',
      '  #  ■ Raw block volumes (not just filesystems)'
    ]),
    tldr('Kubernetes storage: PVs are storage resources, PVCs are requests. StorageClasses enable dynamic provisioning. CSI standardizes driver interfaces. Access modes define how volumes are shared across pods and nodes.'),
  ]
};

topics.scheduling = {
  title: 'Scheduling',
  content: [
    section('Kubernetes Scheduling'),
    ['"The scheduler assigns Pods to Nodes based on resource availability, constraints, and policies."', 'cyan'],
    divider(),
    section('Scheduling Flow'),
    diagramBlock([
      '  Pod created (Pending)',
      '         │',
      '         ▼',
      '  ┌─────────────────────────────────────────────┐',
      '  │  FILTERING (Predicates)                      │',
      '  │  • Node has enough CPU/Memory?               │',
      '  │  • Node satisfies nodeSelector?              │',
      '  │  • Node tolerates pod taints?                │',
      '  │  • Node port conflicts?                      │',
      '  └──────────────────┬──────────────────────────┘',
      '                     │',
      '                     ▼',
      '  ┌─────────────────────────────────────────────┐',
      '  │  SCORING (Priorities)                        │',
      '  │  • Least resource utilization               │',
      '  │  • Pod affinity/anti-affinity               │',
      '  │  • Node affinity preferences                │',
      '  │  • Image locality (node already has image)  │',
      '  └──────────────────┬──────────────────────────┘',
      '                     │',
      '                     ▼',
      '  Pod assigned to Node (Running)',
      '',
      '  // The scheduler communicates its decision by',
      '  // writing the node name to the Pod object.',
      '  // kubelet on that node then creates the containers.'
    ]),
    divider(),
    section('Node Affinity'),
    codeBlock([
      '  # REQUIRED (hard constraint — scheduling fails if not met)',
      '  spec:',
      '    affinity:',
      '      nodeAffinity:',
      '        requiredDuringSchedulingIgnoredDuringExecution:',
      '          nodeSelectorTerms:',
      '          - matchExpressions:',
      '            - key: topology.kubernetes.io/zone',
      '              operator: In',
      '              values:',
      '              - us-east-1a',
      '              - us-east-1b',
      '',
      '  # PREFERRED (soft — scheduler tries, may skip)',
      '        preferredDuringSchedulingIgnoredDuringExecution:',
      '        - weight: 100',
      '          preference:',
      '            matchExpressions:',
      '            - key: node-type',
      '              operator: In',
      '              values:',
      '              - gpu',
      '',
      '  # Operators: In, NotIn, Exists, DoesNotExist, Gt, Lt'
    ]),
    divider(),
    section('Taints & Tolerations'),
    diagramBlock([
      '  TAINT on Node:',
      '  "This node has GPU. Only pods with toleration can run."',
      '',
      '  ┌──────────────────────────────┐',
      '  │  Node: gpu-node              │',
      '  │  Taint: gpu=true:NoSchedule  │',
      '  │                              │',
      '  │  ┌──────────────┐            │',
      '  │  │  Pod: ml-app  │            │',
      '  │  │  Toleration:  │            │',
      '  │  │  gpu=true     │            │  ✓ scheduled',
      '  │  └──────────────┘            │',
      '  │                              │',
      '  │  ┌──────────────┐            │',
      '  │  │  Pod: web-app │            │',
      '  │  │  (no toler.)  │            │  ✗ not scheduled',
      '  │  └──────────────┘            │',
      '  └──────────────────────────────┘',
      '',
      '  # Add a taint to a node:',
      '  $ kubectl taint nodes gpu-node gpu=true:NoSchedule',
      '',
      '  # Toleration in pod spec:',
      '  spec:',
      '    tolerations:',
      '    - key: "gpu"',
      '      operator: "Equal"',
      '      value: "true"',
      '      effect: "NoSchedule"',
      '',
      '  # Taint effects:',
      '  #  NoSchedule       — don\'t schedule new pods',
      '  #  PreferNoSchedule — try not to schedule',
      '  #  NoExecute        — evict existing pods without toleration'

    divider(),
    section('Pod Affinity & Anti-Affinity'),
    codeBlock([
      '  # Pod affinity — co-locate pods on the same node/topology',
      '  spec:',
      '    affinity:',
      '      podAffinity:',
      '        requiredDuringSchedulingIgnoredDuringExecution:',
      '        - labelSelector:',
      '            matchExpressions:',
      '            - key: app',
      '              operator: In',
      '              values:',
      '              - cache',
      '          topologyKey: topology.kubernetes.io/zone',
      '',
      '  # Pod anti-affinity — spread pods across topology',
      '      podAntiAffinity:',
      '        preferredDuringSchedulingIgnoredDuringExecution:',
      '        - weight: 100',
      '          podAffinityTerm:',
      '            labelSelector:',
      '              matchLabels:',
      '                app: web',
      '            topologyKey: kubernetes.io/hostname',
      '',
      '  # Example: spread 3 web pods across 3 nodes',
      '  # (one per hostname — high availability)',
      '',
      '  # topologyKey options:',
      '  #  kubernetes.io/hostname     — per node',
      '  #  topology.kubernetes.io/zone — per AZ',
      '  #  topology.kubernetes.io/region — per region'
    ]),
    divider(),
    section('Resource Requests & Limits'),
    codeBlock([
      '  # Every pod should specify resource requirements:',
      '',
      '  resources:',
      '    requests:   # minimum guaranteed',
      '      memory: "256Mi"',
      '      cpu: "250m"  # 1/4 core',
      '    limits:     # maximum allowed',
      '      memory: "512Mi"',
      '      cpu: "500m"  # 1/2 core',
      '',
      '  # CPU units:',
      '  #  1 vCPU = 1000m (millicores)',
      '  #  250m = 1/4 of a core',
      '  #  0.5 = 500m',
      '',
      '  # Memory units:',
      '  #  Mi (Mebibytes) = 1024^2 bytes',
      '  #  Gi (Gibibytes) = 1024^3 bytes',
      '  #  M (Megabytes)  = 1000^2 bytes (avoid — ambiguous)',
      '',
      '  # Quality of Service (QoS) classes:',
      '  #  Guaranteed    — requests == limits (for all containers)',
      '  #  Burstable     — requests < limits (at least one container)',
      '  #  BestEffort    — no requests or limits set (lowest priority)',
      '',
      '  # PriorityClass — preemption:',
      '  apiVersion: scheduling.k8s.io/v1',
      '  kind: PriorityClass',
      '  metadata:',
      '    name: high-priority',
      '  value: 1000000',
      '  globalDefault: false',

function run(cmd) {
  const parts = cmd.trim().split(/\s+/);
  const command = parts[0].toLowerCase();
  w('<span style="color:var(--prompt)">$</span> ' + cmd, 'prompt-line');
  if (command === 'help') { writeLines(topics.help.content); }
  else if (command === 'basics') { writeLines(topics.basics.content); }
  else if (command === 'pods') { writeLines(topics.pods.content); }
  else if (command === 'workloads' || command === 'deployment' || command === 'replicaset' || command === 'daemonset' || command === 'statefulset' || command === 'job' || command === 'cronjob') { writeLines(topics.workloads.content); }
  else if (command === 'services') { writeLines(topics.services.content); }
  else if (command === 'config') { writeLines(topics.config.content); }
  else if (command === 'storage') { writeLines(topics.storage.content); }
  else if (command === 'scheduling') { writeLines(topics.scheduling.content); }
  else if (command === 'networking') { writeLines(topics.networking.content); }
  else if (command === 'security') { writeLines(topics.security.content); }
  else if (command === 'kubectl') { writeLines(topics.kubectl.content); }
  else if (command === 'diagram') { writeLines(topics.diagram.content); }
  else if (command === 'clear') { term.innerHTML = ''; }
  else if (command === '') { }
  else { w('Unknown command: ' + command, 'error'); w('Type "help" to see all available commands.', 'info'); }
  scrollBottom();
}

input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') { const cmd = input.value.trim(); input.value = ''; if (cmd) run(cmd); }
});

const bootLines = [
  ['<span style="color:var(--green)">╔═══════════════════════════════════════════════╗</span>', ''],
  ['<span style="color:var(--green)">║</span>     <span style="color:var(--cyan)">KUBERNETES INTERACTIVE LAB</span>              <span style="color:var(--green)">║</span>', ''],
  ['<span style="color:var(--green)">╚═══════════════════════════════════════════════╝</span>', ''],
  '',
  ['Welcome, student. This terminal is your Kubernetes sandbox.', 'info'],
  ['Every command teaches a concept using: <span style="color:var(--yellow)">Problem → Mechanism → Visual → Code → TL;DR</span>', 'info'],
  '',
  ['Type <span style="color:var(--cyan)">help</span> to begin, or try <span style="color:var(--cyan)">basics</span>, <span style="color:var(--cyan)">pods</span>, <span style="color:var(--cyan)">workloads</span>, <span style="color:var(--cyan)">diagram</span>', 'cyan'],
];

let bootIdx = 0;
function typeBoot() {
  if (bootIdx < bootLines.length) { const l = bootLines[bootIdx]; if (typeof l === 'string') { w(l); } else { w(l[0], l[1]); } bootIdx++; setTimeout(typeBoot, 60); }
  else { w('', ''); w('<span style="color:var(--green)">System ready. <span style="color:var(--cyan)">$ █</span>', ''); scrollBottom(); }
}

setTimeout(typeBoot, 200);
document.addEventListener('click', () => input.focus());
</script>

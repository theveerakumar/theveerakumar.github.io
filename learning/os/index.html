<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<link rel="icon" type="image/png" href="/favicon.png">

<title>OS Interactive Lab</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Cascadia Code','Fira Code','Courier New',monospace}
:root{--bg:#0a0e14;--surface:#0f1620;--border:#1a2332;--text:#b3b1ad;--green:#b8cc52;--cyan:#95e6cb;--yellow:#f9c440;--red:#ff6c6c;--dim:#525a66;--prompt:#f9c440;--highlight:rgba(184,204,82,0.12);--timing:0.02s}
body{background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:8px 20px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.header-title{color:var(--green);font-size:13px;font-weight:bold}
.header-title span{color:var(--dim)}
.header-nav{display:flex;gap:16px;font-size:12px}
.header-nav a{color:var(--dim);text-decoration:none}
.header-nav a:hover{color:var(--cyan)}
#terminal{flex:1;overflow-y:auto;padding:12px 16px 0;scroll-behavior:smooth}
#terminal::-webkit-scrollbar{width:6px}
#terminal::-webkit-scrollbar-track{background:var(--surface)}
#terminal::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.line{margin-bottom:2px;line-height:1.5;white-space:pre-wrap;word-break:break-word;animation:fadeIn 0.15s ease-out}
@keyframes fadeIn{from{opacity:0;transform:translateY(-3px)}to{opacity:1;transform:translateY(0)}}
.line.prompt-line{color:var(--prompt);font-weight:bold}
.line.error{color:var(--red)}
.line.info{color:var(--dim)}
.line.success{color:var(--green)}
.line.cyan{color:var(--cyan)}
.line.yellow{color:var(--yellow)}
.line.dim{color:var(--dim)}
.line.bold{font-weight:bold}
.line.lg{font-size:1.1em;margin:6px 0}
.line.section{color:var(--green);font-weight:bold;font-size:1.1em;margin:10px 0 4px;letter-spacing:0.5px}
.line.subsection{color:var(--cyan);margin:6px 0 2px}
.line.diagram{color:var(--dim);font-size:0.85em;line-height:1.2;margin:4px 0}
.line.code{color:var(--yellow);font-size:0.85em;padding:6px 12px;margin:4px 0;border-left:2px solid var(--border);background:var(--highlight);border-radius:0 4px 4px 0}
.line.divider{color:var(--border);margin:6px 0}
.line.tldr{color:var(--yellow);font-style:italic;margin:8px 0 4px;padding:6px 12px;border:1px dashed var(--border);border-radius:4px}
.line.highlight{background:var(--highlight);padding:4px 8px;border-radius:4px;margin:4px 0}
.line.typing{overflow:hidden;border-right:2px solid var(--green);animation:typing 0.8s steps(40,end),blinkCaret 0.75s step-end infinite;max-width:fit-content}
.line.animate-bar{display:inline-block;height:14px;background:var(--green);margin-right:2px;border-radius:2px;animation:growBar 0.5s ease-out forwards;transform-origin:bottom}
@keyframes growBar{from{transform:scaleY(0)}to{transform:scaleY(1)}}
@keyframes blinkCaret{50%{border-color:transparent}}
.cursor-blink{animation:blink 1s step-end infinite}
@keyframes blink{50%{opacity:0}}
.input-area{display:flex;align-items:center;padding:8px 16px 14px;background:var(--surface);border-top:1px solid var(--border);flex-shrink:0;gap:8px}
.input-area .prompt{color:var(--prompt);font-size:14px;user-select:none}
.input-area input{flex:1;background:transparent;border:none;color:var(--text);font-size:14px;outline:none;font-family:inherit}
.input-area input::placeholder{color:var(--dim);font-size:12px}
.suggestions{font-size:11px;color:var(--dim);padding:0 16px 4px;background:var(--surface);border-top:1px solid var(--border);display:flex;gap:12px;flex-wrap:wrap;flex-shrink:0}
.suggestions span{cursor:pointer}
.suggestions span:hover{color:var(--cyan)}
.progress-bar{display:flex;gap:2px;align-items:end;height:30px;padding:4px 0}
.progress-bar .bar{width:24px;border-radius:3px 3px 0 0;animation:growBar 0.4s ease-out forwards}
@media(max-width:600px){.header-nav{display:none}#terminal{padding:8px 10px}.line{font-size:0.9em}}
</style>
</head>

<div class="header-title">OS Interactive Lab <span>— explore, experiment, understand</span></div>
<div class="header-nav"><a href="https://veerakumar.com">veerakumar.com</a><a href="https://github.com/theveerakumar">github</a><a href="https://man7.org/linux/man-pages/" target="_blank">official docs</a></div>

<div class="input-area">
<span class="prompt">$</span>
<input type="text" id="cmd" placeholder="type a command or try help" autofocus spellcheck="false" autocomplete="off">

<script>
const term = document.getElementById('terminal');
const input = document.getElementById('cmd');

function scrollBottom() { setTimeout(() => { term.scrollTop = term.scrollHeight; }, 20); }

function w(text, cls = '') {
  const d = document.createElement('div');
  d.className = 'line' + (cls ? ' ' + cls : '');
  d.innerHTML = text;
  term.appendChild(d);
  scrollBottom();
}

function writeLines(lines) {
  lines.forEach((l, i) => {
    setTimeout(() => {
      if (typeof l === 'string') w(l);
      else w(l[0], l[1] || '');
      if (i === lines.length - 1) scrollBottom();
    }, i * 25);
  });
}

function divider() { return ['─'.repeat(60), 'divider']; }

function section(title) { return ['<span style="color:var(--green)">■</span> ' + title, 'section']; }

function subsection(title) { return [title, 'subsection']; }

function codeBlock(lines) {
  const code = lines.map(l => '  ' + l).join('\n');
  return [code, 'code'];
}

function diagramBlock(lines) {
  return [lines.join('\n'), 'diagram'];
}

function tldr(text) {
  return ['<span style="color:var(--yellow)">⚡</span> ' + text, 'tldr'];
}

function note(text) {
  return [text, 'dim'];
}

      '   │          └─────────────┘',
      '   ▼',
      '  ┌─────────────┐',
      '  │   WAITING   │  Waiting for I/O or event',
      '  └──────┬──────┘',
      '         │  I/O complete or signal received',
      '         └────────→ READY'
    ]),
    divider(),
    section('Process Control Block (PCB)'),
    ['The PCB is the OS\'s "driver\'s license" for every process.', 'info'],
    codeBlock([
      '  struct task_struct {  // Linux\'s PCB (~2KB per process)',
      '    pid_t pid;               // Process ID',
      '    long state;              // Running, Sleeping, Stopped, Zombie',
      '    struct mm_struct *mm;    // Memory map',
      '    struct files_struct *files; // Open file descriptors',
      '    struct thread_struct thread; // CPU registers (saved on ctx sw)',
      '    unsigned int policy;     // Scheduling policy',
      '    int prio, static_prio;   // Priority values',
      '    struct list_head children; // Child processes',
      '    char comm[TASK_COMM_LEN]; // Process name (e.g., "chrome")',
      '    ...  // 100+ more fields',
      '  };'

    section('Context Switching — The Hidden Cost'),
    ['When the CPU switches from Process A → Process B:', 'info'],
    codeBlock([
      '  1. Save A\'s registers into A\'s PCB',
      '  2. Save A\'s stack pointer into A\'s PCB',
      '  3. Flush TLB (translation lookaside buffer)',
      '  4. Load B\'s registers from B\'s PCB',
      '  5. Load B\'s stack pointer',
      '  6. Resume execution at B\'s last PC',
      '',
      '  // Cost: 1-100 microseconds depending on hardware',
      '  // 1000 ctx switches/sec ≈ 1-10% CPU overhead',

  ]

      '',
      '  WITH MUTEX:',
      '  T1 ──[LOCK]──[read][write]──[UNLOCK]──→ counter = 6',

      '  // Producer:',
      '  pthread_mutex_lock(&lock);',

      '  buffer_ready = 1;',

      '  pthread_mutex_unlock(&lock);',
      '',
      '  // Consumer:',
      '  pthread_mutex_lock(&lock);',

      '  ■ User/Supervisor — Accessible from user space or kernel only',

      '  ■ Accessed — Set by hardware when page is read/written',
      '  ■ Dirty — Set by hardware when page is written',

      '  // • Buffer overflow exploits (NX bit)',
      '  // • Reading kernel memory from user space',
      '  // • Writing to code sections'
    ]),

  ]

function simulateSched(alg, args) {
  if (!args || args.length < 2) {
    w('Usage: simulate ' + alg + ' arrival1,burst1 arrival2,burst2 ... [quantum=N]', 'error');
    w('Example: simulate ' + alg + ' 0,8 1,4 2,9', 'info');
    return;
  }
  let quantum = 2;
  const processes = [];
  for (const a of args) {
    if (a.startsWith('quantum=')) { quantum = parseInt(a.split('=')[1]); continue; }
    const parts = a.split(',').map(Number);
    if (parts.length === 2 && !isNaN(parts[0]) && !isNaN(parts[1])) {
      processes.push({at: parts[0], bt: parts[1], rem: parts[1], id: processes.length + 1});
    }
  }
  if (processes.length === 0) { w('No valid processes', 'error'); return; }
  processes.sort((a, b) => a.at - b.at);
  const n = processes.length;
  let time = 0, completed = 0, totalWT = 0, totalTAT = 0;
  let schedule = '', idx = 0;
  const orig = processes.map(p => ({...p}));

  w('', 'divider');
  w('SIMULATION: ' + alg.toUpperCase(), 'bold cyan');
  w('Processes: ' + processes.map(p => `P${p.id}(arr=${p.at},burst=${p.bt})`).join(', '), 'info');
  w('', 'divider');

  if (alg === 'fcfs') {
    let q = [...processes].sort((a, b) => a.at - b.at);
    const timeline = [];
    while (q.length > 0) {
      if (time < q[0].at) time = q[0].at;
      const p = q.shift();
      const start = time;
      time += p.bt;
      const tat = time - p.at;
      const wt = tat - p.bt;
      totalWT += wt; totalTAT += tat;
      timeline.push({id: p.id, start, end: time});
    }
    drawTimeline(timeline);
    w('', 'divider');
    w('Avg Waiting Time: ' + (totalWT / n).toFixed(2), 'yellow');
    w('Avg Turnaround:   ' + (totalTAT / n).toFixed(2), 'yellow');
  }
  else if (alg === 'sjf') {
    let q = [...processes].map(p => ({...p}));
    const timeline = [];
    while (q.length > 0) {
      const available = q.filter(p => p.at <= time);
      if (available.length === 0) { time = Math.min(...q.map(p => p.at)); continue; }
      available.sort((a, b) => a.bt - b.bt);
      const p = available[0];
      q = q.filter(x => x !== p);
      const start = time;
      time += p.bt;
      const tat = time - p.at;
      const wt = tat - p.bt;
      totalWT += wt; totalTAT += tat;
      timeline.push({id: p.id, start, end: time});
    }
    drawTimeline(timeline);
    w('', 'divider');
    w('Avg Waiting Time: ' + (totalWT / n).toFixed(2), 'yellow');
    w('Avg Turnaround:   ' + (totalTAT / n).toFixed(2), 'yellow');
  }
  else if (alg === 'rr') {
    let q = [...processes].map(p => ({...p}));
    const timeline = [];
    let currentTime = 0;
    let readyQueue = [];
    let allDone = false;
    while (!allDone) {
      const newProcs = q.filter(p => p.at <= currentTime && p.rem > 0 && !readyQueue.includes(p) && !timeline.find(t => t.id === p.id && t.end > currentTime - 1));
      readyQueue.push(...newProcs.filter(p => !readyQueue.includes(p)));
      if (readyQueue.length === 0) { currentTime++; continue; }
      const p = readyQueue.shift();
      const exec = Math.min(quantum, p.rem);
      const start = currentTime;
      currentTime += exec;
      p.rem -= exec;
      timeline.push({id: p.id, start, end: currentTime});
      const newOnes = q.filter(x => x.at > start && x.at <= currentTime && x.rem > 0 && !readyQueue.includes(x));
      readyQueue.push(...newOnes);
      if (p.rem > 0) readyQueue.push(p);
      allDone = q.every(p => p.rem === 0);
    }
    drawTimeline(timeline);
    const pTimes = {};
    timeline.forEach(t => {
      if (!pTimes[t.id]) pTimes[t.id] = {end: 0, start: Infinity, total: 0};
      if (t.start < pTimes[t.id].start) pTimes[t.id].start = t.start;
      if (t.end > pTimes[t.id].end) pTimes[t.id].end = t.end;
      pTimes[t.id].total += t.end - t.start;
    });
    Object.entries(pTimes).forEach(([id, t]) => {
      const p = processes.find(x => x.id === parseInt(id));
      const tat = t.end - p.at;
      const wt = tat - p.bt;
      totalWT += wt; totalTAT += tat;
    });
    w('', 'divider');
    w('Quantum: ' + quantum, 'info');
    w('Avg Waiting Time: ' + (totalWT / n).toFixed(2), 'yellow');
    w('Avg Turnaround:   ' + (totalTAT / n).toFixed(2), 'yellow');
  }
  else if (alg === 'compare') {
    ['FCFS', 'SJF', 'RR'].forEach(a => {
      const copy = processes.map(p => ({...p}));
      let t = 0, twt = 0, ttat = 0;
      if (a === 'FCFS') {
        const sorted = [...copy].sort((a,b) => a.at - b.at);
        const tl = [];
        sorted.forEach(p => { if (t < p.at) t = p.at; t += p.bt; tl.push({id:p.id,start:t-p.bt,end:t}); });
        const stats = copy.map(p => { const end = tl.filter(x => x.id===p.id).pop().end; const tat = end - p.at; const wt = tat - p.bt; return {wt,tat}; });
        w(`${a}: Avg WT=${(stats.reduce((s,x)=>s+x.wt,0)/n).toFixed(2)}  Avg TAT=${(stats.reduce((s,x)=>s+x.tat,0)/n).toFixed(2)}`, 'info');
      } else if (a === 'SJF') {
        let q = [...copy]; t = 0; const tl = [];
        while (q.length) {
          const avail = q.filter(p => p.at <= t);
          if (!avail.length) { t = Math.min(...q.map(p => p.at)); continue; }
          avail.sort((a,b) => a.bt - b.bt);
          const p = avail[0]; q = q.filter(x => x !== p);
          t += p.bt; tl.push({id:p.id,start:t-p.bt,end:t});
        }
        const stats = copy.map(p => { const end = tl.filter(x => x.id===p.id).pop().end; const tat = end - p.at; const wt = tat - p.bt; return {wt,tat}; });
        w(`${a}: Avg WT=${(stats.reduce((s,x)=>s+x.wt,0)/n).toFixed(2)}  Avg TAT=${(stats.reduce((s,x)=>s+x.tat,0)/n).toFixed(2)}`, 'info');
      } else {
        let q = [...copy]; t = 0; const tl = [];
        let rq = []; let done = false;
        while (!done) {
          const newOnes = q.filter(p => p.at <= t && p.rem > 0 && !rq.includes(p));
          rq.push(...newOnes.filter(p => !rq.includes(p)));
          if (!rq.length) { t++; continue; }
          const p = rq.shift();
          const ex = Math.min(quantum, p.rem);
          const s = t; t += ex; p.rem -= ex;
          tl.push({id:p.id,start:s,end:t});
          const later = q.filter(x => x.at > s && x.at <= t && x.rem > 0 && !rq.includes(x));
          rq.push(...later);
          if (p.rem > 0) rq.push(p);
          done = q.every(p => p.rem === 0);
        }
        const pEnds = {};
        tl.forEach(x => { if (!pEnds[x.id] || x.end > pEnds[x.id]) pEnds[x.id] = x.end; });
        const stats = copy.map(p => { const end = pEnds[p.id]; const tat = end - p.at; const wt = tat - p.bt; return {wt,tat}; });
        w(`${a}(q=${quantum}): Avg WT=${(stats.reduce((s,x)=>s+x.wt,0)/n).toFixed(2)}  Avg TAT=${(stats.reduce((s,x)=>s+x.tat,0)/n).toFixed(2)}`, 'info');
      }
    });
    w('', 'divider');
    w('FCFS minimizes waiting time variance.', 'dim');
    w('SJF minimizes average waiting time (optimal).', 'dim');
    w('RR guarantees fairness at the cost of context switches.', 'dim');
  }
}

function drawTimeline(timeline) {
  if (timeline.length === 0) return;
  const maxTime = Math.max(...timeline.map(t => t.end));
  const maxId = Math.max(...timeline.map(t => t.id));
  const scale = Math.min(400 / maxTime, 20);
  const colors = ['#b8cc52','#95e6cb','#f9c440','#ff6c6c','#c594c5','#5fa8d3','#f5a97f','#a6d189'];

  for (let id = 1; id <= maxId; id++) {
    const parts = timeline.filter(t => t.id === id);
    if (parts.length === 0) continue;
    let line = `P${id} `;
    const bar = document.createElement('div');
    bar.style.display = 'flex';
    bar.style.alignItems = 'center';
    bar.style.gap = '2px';
    bar.style.marginBottom = '4px';
    const label = document.createElement('span');
    label.style.color = 'var(--dim)';
    label.style.fontSize = '11px';
    label.style.width = '24px';
    label.textContent = `P${id}`;
    bar.appendChild(label);

    parts.forEach(t => {
      const w = Math.max(Math.round((t.end - t.start) * scale), 6);
      const seg = document.createElement('div');
      seg.style.width = w + 'px';
      seg.style.height = '18px';
      seg.style.background = colors[(id - 1) % colors.length];
      seg.style.borderRadius = '3px';
      seg.style.opacity = '0.85';
      seg.style.position = 'relative';
      seg.title = `P${id}: ${t.start}-${t.end}`;
      bar.appendChild(seg);
    });

    term.appendChild(bar);
  }

  // Time axis
  const axis = document.createElement('div');
  axis.style.display = 'flex';
  axis.style.marginTop = '4px';
  axis.style.color = 'var(--dim)';
  axis.style.fontSize = '10px';
  axis.style.paddingLeft = '28px';
  for (let t = 0; t <= maxTime; t += Math.max(1, Math.floor(maxTime / 8))) {
    const tick = document.createElement('span');
    tick.style.width = Math.round(t * scale) - (t === 0 ? 0 : Math.round((t - Math.max(1, Math.floor(maxTime / 8))) * scale)) + 'px';
    tick.style.display = 'inline-block';
    tick.textContent = t;
    axis.appendChild(tick);
  }
  term.appendChild(axis);
  scrollBottom();
}

  if (command === 'help') { writeLines(topics.help.content); }

  else if (command === 'schedule') { writeLines(topics.schedule.content); }
  else if (command === 'threads') { writeLines(topics.threads.content); }
  else if (command === 'sync') { writeLines(topics.sync.content); }
  else if (command === 'memory') { writeLines(topics.memory.content); }
  else if (command === 'virtualmem') { writeLines(topics.virtualmem.content); }
  else if (command === 'filesystem') { writeLines(topics.filesystem.content); }
  else if (command === 'device') { writeLines(topics.device.content); }
  else if (command === 'security') { writeLines(topics.security.content); }
  else if (command === 'virtualization') { writeLines(topics.virtualization.content); }
  else if (command === 'diagram') { writeLines(topics.diagram.content); }
  else if (command === 'simulate') {
    if (args.length === 0) { writeLines(topics.simulate.content); }
    else { const alg = args[0].toLowerCase(); const rest = args.slice(1); simulateSched(alg, rest); }
  }
  else if (command === 'clear') {
    term.innerHTML = '';
  }
  else if (command === '') { }
  else {
    w('Unknown command: ' + command, 'error');
    w('Type "help" to see all available commands.', 'info');
  }
  scrollBottom();
}

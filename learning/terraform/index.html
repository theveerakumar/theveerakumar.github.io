<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Terraform Interactive Lab</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;font-family:'Cascadia Code','Fira Code','Courier New',monospace}
:root{--bg:#0a0e14;--surface:#0f1620;--border:#1a2332;--text:#b3b1ad;--green:#b8cc52;--cyan:#95e6cb;--yellow:#f9c440;--red:#ff6c6c;--dim:#525a66;--prompt:#f9c440;--highlight:rgba(184,204,82,0.12)}
body{background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column;overflow:hidden}
.header{background:var(--surface);border-bottom:1px solid var(--border);padding:8px 20px;display:flex;justify-content:space-between;align-items:center;flex-shrink:0}
.header-title{color:var(--green);font-size:13px;font-weight:bold}
.header-title span{color:var(--dim)}
.header-nav{display:flex;gap:16px;font-size:12px}
.header-nav a{color:var(--dim);text-decoration:none}
.header-nav a:hover{color:var(--cyan)}
#terminal{flex:1;overflow-y:auto;padding:12px 16px 0;scroll-behavior:smooth}
#terminal::-webkit-scrollbar{width:6px}
#terminal::-webkit-scrollbar-track{background:var(--surface)}
#terminal::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}
.line{margin-bottom:2px;line-height:1.5;white-space:pre-wrap;word-break:break-word;animation:fadeIn 0.15s ease-out}
@keyframes fadeIn{from{opacity:0;transform:translateY(-3px)}to{opacity:1;transform:translateY(0)}}
.line.prompt-line{color:var(--prompt);font-weight:bold}
.line.error{color:var(--red)}
.line.info{color:var(--dim)}
.line.success{color:var(--green)}
.line.cyan{color:var(--cyan)}
.line.yellow{color:var(--yellow)}
.line.dim{color:var(--dim)}
.line.bold{font-weight:bold}
.line.lg{font-size:1.1em;margin:6px 0}
.line.section{color:var(--green);font-weight:bold;font-size:1.1em;margin:10px 0 4px;letter-spacing:0.5px}
.line.subsection{color:var(--cyan);margin:6px 0 2px}
.line.diagram{color:var(--dim);font-size:0.85em;line-height:1.2;margin:4px 0}
.line.code{color:var(--yellow);font-size:0.85em;padding:6px 12px;margin:4px 0;border-left:2px solid var(--border);background:var(--highlight);border-radius:0 4px 4px 0}
.line.divider{color:var(--border);margin:6px 0}
.line.tldr{color:var(--yellow);font-style:italic;margin:8px 0 4px;padding:6px 12px;border:1px dashed var(--border);border-radius:4px}
@media(max-width:600px){.header-nav{display:none}#terminal{padding:8px 10px}.line{font-size:0.9em}}
.suggestions{font-size:11px;color:var(--dim);padding:0 16px 4px;background:var(--surface);border-top:1px solid var(--border);display:flex;gap:12px;flex-wrap:wrap;flex-shrink:0}
.suggestions span{cursor:pointer}
.suggestions span:hover{color:var(--cyan)}
</style>
</head>
<body>

<div class="header">
<div class="header-title">Terraform Interactive Lab <span>— explore, experiment, understand</span></div>
<div class="header-nav"><a href="https://veerakumar.com">veerakumar.com</a><a href="https://github.com/theveerakumar">github</a><a href="https://developer.hashicorp.com/terraform/docs" target="_blank">official docs</a></div>
</div>

<div id="terminal"></div>

<div class="suggestions" id="suggestions">
<span onclick="run('help')">help</span>
<span onclick="run('basics')">basics</span>
<span onclick="run('hcl')">hcl</span>
<span onclick="run('state')">state</span>
<span onclick="run('resources')">resources</span>
<span onclick="run('modules')">modules</span>
<span onclick="run('workspaces')">workspaces</span>
<span onclick="run('plan')">plan</span>
<span onclick="run('advanced')">advanced</span>
<span onclick="run('bestpractices')">bestpractices</span>
<span onclick="run('diagram')">diagram</span>
</div>

<div class="input-area">
<span class="prompt">$</span>
<input type="text" id="cmd" placeholder="type a command or try help" autofocus spellcheck="false" autocomplete="off">
</div>

<script>
const term = document.getElementById('terminal');
const input = document.getElementById('cmd');

function scrollBottom() { setTimeout(() => { term.scrollTop = term.scrollHeight; }, 20); }
function w(text, cls = '') { const d = document.createElement('div'); d.className = 'line' + (cls ? ' ' + cls : ''); d.innerHTML = text; term.appendChild(d); scrollBottom(); }

function writeLines(lines) {
  lines.forEach((l, i) => {
    setTimeout(() => {
      if (typeof l === 'string') w(l);
      else w(l[0], l[1] || '');
      if (i === lines.length - 1) scrollBottom();
    }, i * 25);
  });
}

function divider() { return ['─'.repeat(60), 'divider']; }
function section(title) { return ['<span style="color:var(--green)">■</span> ' + title, 'section']; }
function subsection(title) { return [title, 'subsection']; }
function codeBlock(lines) { return [lines.map(l => '  ' + l).join('\n'), 'code']; }
function diagramBlock(lines) { return [lines.join('\n'), 'diagram']; }
function tldr(text) { return ['<span style="color:var(--yellow)">⚡</span> ' + text, 'tldr']; }
function note(text) { return [text, 'dim']; }

      '    subnet_id = aws_subnet.public[count.index].id',
      '  }',
      '',
      '  # Access resource attributes:',
      '  #  <resource_type>.<local_name>.<attribute>',
      '  #  aws_instance.web.id',
      '  #  aws_instance.web[*].private_ip  (splat with count)'
    ]),
    divider(),
    section('Providers'),
    codeBlock([
      '  # Providers are plugins that connect to APIs.',
      '  # defined in terraform {} block or provider block.',
      '',
      '  terraform {',
      '    required_providers {',
      '      aws = {',
      '        source  = "hashicorp/aws"',
      '        version = "~> 5.0"',
      '      }',
      '      kubernetes = {',
      '        source  = "hashicorp/kubernetes"',
      '        version = ">= 2.0"',
      '      }',
      '    }',
      '    required_version = ">= 1.0"',
      '  }',
      '',
      '  # Provider configuration:',
      '  provider "aws" {',
      '    region = var.region',
      '  }',
      '',
      '  # Multiple configurations (aliases):',
      '  provider "aws" {',
      '    alias  = "west"',
      '    region = "us-west-2"',
      '  }',
      '',
      '  # Use alias: resource "aws_instance" "web" { provider = aws.west }',
      '',
      '  # Popular providers: aws, azurerm, google, kubernetes,',
      '  #   helm, github, datadog, cloudflare, okta, mongodbatlas'
    ]),
    divider(),
    section('Data Sources'),
    codeBlock([
      '  # Data sources READ information from providers',
      '  # (without creating anything)',
      '',
      '  # Fetch the default VPC:',
      '  data "aws_vpc" "default" {',
      '    default = true',
      '  }',
      '',
      '  # Fetch latest Ubuntu AMI:',
      '  data "aws_ami" "ubuntu" {',
      '    most_recent = true',
      '    filter {',
      '      name   = "name"',
      '      values = ["ubuntu/images/hvm-ssd/ubuntu-22.04-*"]',
      '    }',
      '    owners = ["099720109477"]  # Canonical',
      '  }',
      '',
      '  # Use data sources:',
      '  resource "aws_instance" "web" {',
      '    ami = data.aws_ami.ubuntu.id',
      '    subnet_id = data.aws_subnet.public.id',
      '    vpc_security_group_ids = [data.aws_security_group.web.id]',
      '  }',
      '',
      '  # Data source reference pattern:',
      '  #  data.<data_type>.<name>.<attribute>',
      '  #  data.aws_vpc.default.id'
    ]),
    divider(),
    section('Resource Lifecycle'),
    codeBlock([
      '  # The lifecycle meta-argument controls resource behavior:',
      '',
      '  lifecycle {',
      '    # Create new resource before destroying old',
      '    create_before_destroy = true',
      '',
      '    # Prevent accidental destruction',
      '    prevent_destroy = true',
      '',
      '    # Ignore specific attribute changes',
      '    # (e.g., auto-scaling group tag changes)',
      '    ignore_changes = [',
      '      tags,',
      '      ami,  # don\'t recreate if AMI changes externally',
      '    ]',
      '  }',
      '',
      '  # When Terraform detects a change, it:',
      '  #  1. Looks at the lifecycle block',
      '  #  2. If create_before_destroy: creates new, updates depends_on,',
      '  #     then destroys old',
      '  #  3. If prevent_destroy: errors instead of destroying',
      '  #  4. If ignore_changes: skips that attribute in diff'
    ]),
    divider(),
    section('Dependencies'),
    diagramBlock([
      '  Terraform automatically builds a dependency graph:',
      '',
      '  aws_vpc.main',
      '     │',
      '     ├── aws_subnet.public',
      '     │      │',
      '     │      └── aws_instance.web',
      '     │             │',
      '     │             └── aws_eip.web',
      '     │',
      '     └── aws_subnet.private',
      '            │',
      '            └── aws_db_instance.main',
      '',
      '  # Implicit dependency (Terraform detects this):',
      '  resource "aws_instance" "web" {',
      '    subnet_id = aws_subnet.public.id',
      '  }',
      '  # → Terraform knows: subnet must exist before instance',
      '',
      '  # Explicit dependency (when Terraform can\'t infer):',
      '  depends_on = [',
      '    aws_iam_role_policy_attachment.ecs_exec',
      '  ]',
      '',
      '  # Terraform creates resources in DEPENDENCY ORDER',
      '  # and destroys them in REVERSE order.'
    ]),
    tldr('Resources create infrastructure. Providers connect to APIs. Data sources read existing info. Lifecycle controls create/destroy/ignore behavior. Dependencies are automatic (implicit) or manual (depends_on).'),
  ]
};

topics.modules = {

    ['"Modules are self-contained packages of Terraform configurations that are reused across projects — the fundamental unit of composition in Terraform."', 'cyan'],
    divider(),
    section('Module Structure'),
    diagramBlock([
      '  modules/vpc/',
      '  ├── main.tf          # resource definitions',
      '  ├── variables.tf     # input variables',

      '  └── README.md        # documentation',
      '',
      '  Every Terraform directory IS a module:',

      '  - published module = from registry or Git'

      '  # root main.tf — calling a module',
      '  module "vpc" {',
      '    source = "./modules/vpc"',
      '    # or: "terraform-aws-modules/vpc/aws" (registry)',
      '    # or: "git::https://github.com/org/repo.git" (Git)',
      '    # or: "terraform.cloud.com/org/module/aws" (private)',
      '',
      '    # Version constraint (for registry modules)',
      '    version = "~> 5.0"',
      '',
      '    # Input variables',
      '    name = "my-vpc"',
      '    cidr = "10.0.0.0/16"',
      '    azs  = ["us-east-1a", "us-east-1b"]',
      '    private_subnets = ["10.0.1.0/24", "10.0.2.0/24"]',
      '    public_subnets  = ["10.0.101.0/24", "10.0.102.0/24"]',
      '',
      '    tags = {',

      '    }',

      '  # Use module outputs:',

      '  module.vpc.public_subnets',
      '  module.vpc.nat_public_ips',
      '',
      '  # Module outputs become available in the root module:',

      '    value = module.vpc.vpc_id',
      '  }'
    ]),
    divider(),

      '  # modules/vpc/main.tf',
      '  resource "aws_vpc" "this" {',
      '    cidr_block = var.cidr',
      '',
      '    tags = merge(var.tags, {',
      '      Name = var.name',
      '    })',
      '  }',
      '',
      '  resource "aws_subnet" "public" {',
      '    count = length(var.public_subnets)',
      '    vpc_id     = aws_vpc.this.id',

      '  variable "public_subnets" { type = list(string) }',
      '  variable "private_subnets" { type = list(string) }',
      '  variable "tags" { type = map(string) default = {} }',
      '',
      '  # modules/vpc/outputs.tf',
      '  output "vpc_id" { value = aws_vpc.this.id }',

      '  output "private_subnets" { value = aws_subnet.private[*].id }'

    divider(),
    section('Terraform Registry'),
    codeBlock([
      '  # The Terraform Registry has thousands of reusable modules:',
      '  # https://registry.terraform.io',
      '',
      '  # Popular modules:',
      '  #  terraform-aws-modules/vpc/aws          — VPC with subnets',
      '  #  terraform-aws-modules/ec2/aws          — EC2 instances',
      '  #  terraform-aws-modules/rds/aws          — RDS databases',
      '  #  terraform-aws-modules/eks/aws          — EKS clusters',
      '  #  terraform-aws-modules/s3-bucket/aws    — S3 buckets',
      '  #  terraform-aws-modules/lambda/aws       — Lambda functions',
      '',
      '  # Module version constraints:',
      '  module "vpc" {',
      '    source  = "terraform-aws-modules/vpc/aws"',
      '    version = "~> 5.0"',
      '    # ~> 5.0  → >= 5.0, < 6.0',
      '    # >= 5.0, < 6.0  → exact range',
      '    # >= 5.0  → minimum version',
      '    # = 5.0.1 → exact version',
      '  }'
    ]),
    divider(),
    section('Module Best Practices'),
    codeBlock([
      '  # DO:',
      '  #  ■ Keep modules focused (Single Responsibility)',
      '  #  ■ Document inputs and outputs (README.md)',
      '  #  ■ Version modules (Git tags, registry versions)',
      '  #  ■ Use semantic versioning for published modules',
      '  #  ■ Pin to major version (~> 5.0)',
      '  #  ■ Test modules (Terratest, kitchen-terraform)',
      '  #  ■ Use locals inside modules for computed values',
      '',
      '  # DON\'T:',
      '  #  ■ Hard-code values inside modules (use variables)',
      '  #  ■ Create modules for everything — only when reused',
      '  #  ■ Use depends_on inside modules (let TF infer)',
      '  #  ■ Store secrets in module source',
      '  #  ■ Have more than 3-4 levels of module nesting',
      '',
      '  # Module source options:',
      '  #  Local:    ./modules/vpc',
      '  #  Registry: "terraform-aws-modules/vpc/aws"',
      '  #  GitHub:   "github.com/org/repo//path"',
      '  #  Git:      "git::https://example.com/repo.git"',
      '  #  GCS:      "gcs::https://storage.googleapis.com/bucket"',
      '  #  HTTP:     "https://example.com/module.tar.gz"',
      '  #  S3:       "s3::https://s3-bucket/module.tar.gz"'

  ]
};

topics.workspaces = {
  title: 'Workspaces & Environments',
  content: [
    section('Workspaces & Environments'),
    ['"Workspaces allow you to manage multiple distinct sets of infrastructure resources using the same configuration."', 'cyan'],
    divider(),
    section('Workspace Concept'),
    diagramBlock([
      '  SAME CODE, DIFFERENT STATE FILES',
      '',
      '  ┌──────────────────────────────────────────────────────────┐',
      '  │  Terraform Configuration (same *.tf files)               │',
      '  │  provider "aws" { region = var.region }                  │',
      '  │  resource "aws_instance" "web" { ... }                   │',
      '  └────┬──────────┬──────────────┬──────────────────────────┘',
      '       │          │              │',
      '       ▼          ▼              ▼',
      '  ┌─────────┐ ┌─────────┐ ┌──────────┐',
      '  │ default │ │ staging │ │ production│',
      '  │ state   │ │ state   │ │ state     │',
      '  │ dev     │ │ stg     │ │ prd       │',
      '  │ .tfstate │ │ .tfstate│ │ .tfstate  │',
      '  └─────────┘ └─────────┘ └──────────┘',
      '',
      '  // Each workspace has its OWN state file.',
      '  // The same config produces different infrastructure',
      '  // based on workspace-specific variables.'
    ]),
    divider(),
    section('Workspace Commands'),
    codeBlock([
      '  # List workspaces',
      '  $ terraform workspace list',
      '    default',
      '  * dev',
      '    staging',
      '    production',
      '',
      '  # Create and switch',
      '  $ terraform workspace new staging',
      '  $ terraform workspace select production',
      '',
      '  # Current workspace',
      '  $ terraform workspace show',
      '  production',
      '',
      '  # Use workspace in config:',

      '  }'
    ]),

      '  # S3 backend with workspace-based state paths:',

      '      bucket         = "company-terraform-state"',

      '  }',
      '',
      '  # With workspaces, state is stored at:',

      '  #   env:/dev/infrastructure.tfstate',

      '  infrastructure/',
      '  ├── modules/',
      '  │   ├── vpc/',
      '  │   ├── ec2/',
      '  │   └── rds/',
      '  ├── dev/',
      '  │   ├── main.tf',
      '  │   ├── variables.tf',

    divider(),
    section('Terragrunt — DRY Terraform'),
    codeBlock([
      '  # Terragrunt is a thin wrapper for Terraform that:',
      '  #  ■ Keeps configuration DRY',
      '  #  ■ Manages remote state automatically',
      '  #  ■ Handles module dependencies',
      '',
      '  # terragrunt.hcl:',
      '  terraform {',
      '    source = "../modules/vpc"',
      '  }',
      '',
      '  include {',
      '    path = find_in_parent_folders()',
      '  }',
      '',
      '  inputs = {',

  ]
};

topics.advanced = {
  title: 'Advanced Features',
  content: [
    section('Advanced Terraform Features'),
    ['"Beyond the basics: count, for_each, dynamic blocks, moved blocks, import, and more — these features make Terraform truly powerful."', 'cyan'],
    divider(),

    codeBlock([
      '  # COUNT — create N instances of a resource',
      '  resource "aws_instance" "web" {',

function run(cmd) {
  const parts = cmd.trim().split(/\s+/);
  const command = parts[0].toLowerCase();
  w('<span style="color:var(--prompt)">$</span> ' + cmd, 'prompt-line');
  if (command === 'help') { writeLines(topics.help.content); }
  else if (command === 'basics') { writeLines(topics.basics.content); }
  else if (command === 'hcl') { writeLines(topics.hcl.content); }
  else if (command === 'state') { writeLines(topics.state.content); }
  else if (command === 'resources') { writeLines(topics.resources.content); }
  else if (command === 'modules') { writeLines(topics.modules.content); }
  else if (command === 'workspaces') { writeLines(topics.workspaces.content); }
  else if (command === 'plan') { writeLines(topics.plan.content); }
  else if (command === 'advanced') { writeLines(topics.advanced.content); }
  else if (command === 'bestpractices') { writeLines(topics.bestpractices.content); }
  else if (command === 'diagram') { writeLines(topics.diagram.content); }
  else if (command === 'clear') { term.innerHTML = ''; }
  else if (command === '') { }
  else { w('Unknown command: ' + command, 'error'); w('Type "help" to see all available commands.', 'info'); }
  scrollBottom();
}

input.addEventListener('keydown', (e) => {
  if (e.key === 'Enter') { const cmd = input.value.trim(); input.value = ''; if (cmd) run(cmd); }
});
